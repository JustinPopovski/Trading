[theme]
base            = "dark"
primaryColor    = "#2196f3"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1e2130"
textColor       = "#fafafa"
font            = "sans serif"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
